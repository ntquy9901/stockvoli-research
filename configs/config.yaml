# TimesFM G4 22.5GB GPU RAM Optimized Configuration
# Google Colab Pro - Better than standard T4!

# System Configuration
system:
  name: "TimesFM VN30 Volatility Forecasting"
  version: "2.0.0"
  device: "cuda"
  random_seed: 42
  project: "TimesFM-VN30-Finetuning"

# Data Configuration
data:
  processed_path: "data/processed"
  stocks:
    - ACB BCM BID BVH CTG FPT GAS GVR HDB HPG MBB MSN MWG NVL PDR PLX POW SAB SHB SSB SSI STB TCB TPB VCB VHM VIB VIC VJC VNM

# Dataset Configuration
dataset:
  context_length: 64  # Safe for 22.5GB
  horizon_length: 1
  samples_per_stock: 150  # Increased for better learning

# Model Configuration
model:
  model_name: "google/timesfm-2.5-200m-transformers"
  parameters:
    context_length: 64
    prediction_length: 1
    use_gradient_checkpointing: true
    dtype: "bfloat16"
  lora:
    r: 4
    lora_alpha: 8
    target_modules: "all-linear"
    lora_dropout: 0.05
    bias: "none"

# Training Configuration - G4 22.5GB OPTIMIZED (CONSERVATIVE)
training:
  batch_size: 16  # CONSERVATIVE - Safe for 22.03GB GPU (batch 24 still OOM)
  gradient_accumulation_steps: 3  # Effective batch = 16 × 3 = 48 (same performance, memory-safe)
  learning_rate: 0.0001
  num_epochs: 100
  optimizer: "SGD"
  max_grad_norm: 1.0

  # Memory optimizations - OPTIMIZED for 53GB system RAM
  num_workers: 6  # Increased from 3 to better utilize 53GB RAM
  pin_memory: true  # Faster CPU->GPU data transfer
  prefetch_factor: 3  # Preload 3 batches per worker (53GB RAM can handle it)
  persistent_workers: true  # Keep workers alive between epochs
  use_mixed_precision: true
  memory_efficient_attention: true
  gradient_checkpointing: true

# Incremental Learning
incremental_learning:
  window_size: 90
  overlap: 30
  epochs_per_window: 1

# Evaluation Configuration
evaluation:
  metrics:
    - QLIKE
    - R2
    - RMSE
    - MSE
  statistical_tests:
    - diebold_mariano
    - giacomini_white

# Experiment Tracking
experiment_tracking:
  experiments_dir: "experiments"
  models_dir: "models"
  log_level: "INFO"
  save_every_n_epochs: 10

# Output Configuration
output:
  checkpoints_dir: "models/checkpoints"
  predictions_dir: "experiments/predictions"
  logs_dir: "experiments/logs"

# G4-Specific Optimizations
g4_optimization:
  max_gpu_utilization: 0.85  # Use 85% of 22.5GB (leave buffer)
  batch_tuning: true  # Auto-adjust batch size if needed
  system_ram_utilization: 0.70  # Use 70% of 53GB system RAM for data loading
  total_prefetch_batches: 18  # 6 workers × 3 prefetch_factor = 18 batches preloaded
  batch_size_optimization: "Conservative: 48→16 with grad_acc 3 → effective 48 (memory-safe)"  # OOM-safe
  expected_speedup: "~2-2.5x faster per epoch (conservative, guaranteed to fit)"  # Safe estimate
