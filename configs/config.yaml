# TimesFM VN30 Fine-tuning Configuration - Working Version
# Matches exactly what model_training_fixed.py expects

# System Configuration
system:
  name: "TimesFM VN30 Volatility Forecasting"
  version: "2.0.0"
  device: "cuda"
  random_seed: 42
  project: "TimesFM-VN30-Finetuning"

# Data Configuration
data:
  processed_path: "data/processed"
  stocks:
    - ACB
    - BCM
    - BID
    - BVH
    - CTG
    - FPT
    - GAS
    - GVR
    - HDB
    - HPG
    - MBB
    - MSN
    - MWG
    - NVL
    - PDR
    - PLX
    - POW
    - SAB
    - SHB
    - SSB
    - SSI
    - STB
    - TCB
    - TPB
    - VCB
    - VHM
    - VIB
    - VIC
    - VJC
    - VNM

# Dataset Configuration for training
dataset:
  context_length: 128  # Increased for A100 - more context = better predictions
  horizon_length: 1
  samples_per_stock: 200

# Model Configuration
model:
  model_name: "google/timesfm-2.5-200m-transformers"
  parameters:
    context_length: 128  # Match dataset
    prediction_length: 1
    use_gradient_checkpointing: false  # Not needed for A100 40GB - faster without
    dtype: "bfloat16"
  lora:
    r: 4
    lora_alpha: 8
    target_modules: "all-linear"
    lora_dropout: 0.05
    bias: "none"

# Training Configuration
training:
  batch_size: 64  # Optimized for A100 40GB - can handle much larger batches
  gradient_accumulation_steps: 1  # Not needed with A100 - faster direct updates
  num_workers: 4  # Parallel data loading for faster training on Colab
  learning_rate: 0.0001
  epochs: 100
  num_epochs: 100  # Script expects 'num_epochs'
  optimizer: "SGD"
  max_grad_norm: 1.0
  use_mixed_precision: true
  memory_efficient_attention: true
  gradient_checkpointing: false  # Disabled for A100 - faster training

# Incremental Learning
incremental_learning:
  window_size: 90
  overlap: 30
  epochs_per_window: 1

# Evaluation Configuration
evaluation:
  metrics:
    - QLIKE
    - R2
    - RMSE
    - MSE
  statistical_tests:
    - diebold_mariano
    - giacomini_white

# Experiment Tracking
experiment_tracking:
  experiments_dir: "experiments"
  models_dir: "models"
  log_level: "INFO"
  save_every: 10
