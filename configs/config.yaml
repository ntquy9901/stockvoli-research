# TimesFM G4 22.5GB GPU RAM Optimized Configuration
# Google Colab Pro - Better than standard T4!

# System Configuration
system:
  name: "TimesFM VN30 Volatility Forecasting"
  version: "2.0.0"
  device: "cuda"
  random_seed: 42
  project: "TimesFM-VN30-Finetuning"

# Data Configuration
data:
  raw_path: "data/raw/prices"
  processed_path: "data/processed"
  stocks:
    - ACB BCM BID BVH CTG FPT GAS GVR HDB HPG MBB MSN MWG NVL PDR PLX POW SAB SHB SSB SSI STB TCB TPB VCB VHM VIB VIC VJC VNM

# Dataset Configuration (MEMORY-OPTIMIZED)
dataset:
  context_length: 32  # REDUCED from 64 - Halves activation memory (15-18GB → 7-9GB)
  horizon_length: 1
  samples_per_stock: 100  # Reduced from 150 - Faster epochs, less memory

# Model Configuration
model:
  model_name: "google/timesfm-2.5-200m-transformers"
  parameters:
    context_length: 32  # Reduced from 64 for memory optimization
    prediction_length: 1
    use_gradient_checkpointing: true
    dtype: "bfloat16"
  lora:
    r: 4
    lora_alpha: 8
    target_modules: "all-linear"
    lora_dropout: 0.05
    bias: "none"

# Training Configuration - G4 22.5GB OPTIMIZED (CONTEXT + BATCH OPTIMIZED)
training:
  batch_size: 12  # CONSERVATIVE - Context 32 + batch 12 = safe combo
  gradient_accumulation_steps: 3  # Effective batch = 12 × 3 = 36 (good balance)
  learning_rate: 0.0001
  num_epochs: 100
  optimizer: "SGD"
  max_grad_norm: 1.0
  early_stopping_patience: 20  # Increased from 5 - Allow more epochs for convergence
  # early_stopping_patience: 999  # Uncomment to DISABLE early stopping (train full num_epochs)

  # Memory optimizations - OPTIMIZED for 53GB system RAM
  num_workers: 4  # Reduced from 6 - Saves system RAM for data loading
  pin_memory: true  # Faster CPU->GPU data transfer
  prefetch_factor: 2  # Reduced from 3 - Less GPU memory pressure
  persistent_workers: true  # Keep workers alive between epochs
  use_mixed_precision: true
  memory_efficient_attention: true
  gradient_checkpointing: true

# Incremental Learning
incremental_learning:
  window_size: 90
  overlap: 30
  epochs_per_window: 1

# Evaluation Configuration
evaluation:
  metrics:
    - QLIKE
    - R2
    - RMSE
    - MSE
  statistical_tests:
    - diebold_mariano
    - giacomini_white

# Experiment Tracking
experiment_tracking:
  experiments_dir: "experiments"
  models_dir: "models"
  log_level: "INFO"
  save_every_n_epochs: 10

# Output Configuration
output:
  checkpoints_dir: "models/checkpoints"
  predictions_dir: "experiments/predictions"
  logs_dir: "experiments/logs"

# G4-Specific Optimizations
g4_optimization:
  max_gpu_utilization: 0.85  # Use 85% of 22.5GB (leave buffer)
  batch_tuning: true  # Auto-adjust batch size if needed
  system_ram_utilization: 0.70  # Use 70% of 53GB system RAM for data loading
  total_prefetch_batches: 18  # 6 workers × 3 prefetch_factor = 18 batches preloaded
  batch_size_optimization: "Combined: ctx 64→32, batch 12 with grad_acc 3 → effective 36 (memory-safe)"  # Safe combo
  expected_speedup: "~2x faster per epoch (context reduction + moderate batch)"  # Conservative estimate
