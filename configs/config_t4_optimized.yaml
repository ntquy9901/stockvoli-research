# TimesFM T4 GPU Optimized Configuration
# T4 14.56GB - Memory optimized settings

# System Configuration
system:
  name: "TimesFM VN30 Volatility Forecasting"
  version: "2.0.0"
  device: "cuda"
  random_seed: 42
  project: "TimesFM-VN30-Finetuning"

# Data Configuration
data:
  processed_path: "data/processed"
  stocks:
    - ACB BCM BID BVH CTG FPT GAS GVR HDB HPG MBB MSN MWG NVL PDR PLX POW SAB SHB SSB SSI STB TCB TPB VCB VHM VIB VIC VJC VNM

# Dataset Configuration for training
dataset:
  context_length: 64  # Standard context length for RV forecasting
  horizon_length: 1
  samples_per_stock: 100  # Reduced to reduce memory overhead

# Model Configuration
model:
  model_name: "google/timesfm-2.5-200m-transformers"
  parameters:
    context_length: 64  # Match dataset
    prediction_length: 1
    use_gradient_checkpointing: true  # CRITICAL for T4 memory!
    dtype: "bfloat16"
  lora:
    r: 4
    lora_alpha: 8
    target_modules: "all-linear"
    lora_dropout: 0.05
    bias: "none"

# Training Configuration - T4 OPTIMIZED
training:
  batch_size: 8  # SAFE for T4 14.56GB (not too aggressive)
  gradient_accumulation_steps: 8  # Effective batch = 64
  learning_rate: 0.0001
  num_epochs: 100  # Script expects 'num_epochs'
  optimizer: "SGD"
  max_grad_norm: 1.0

  # Memory optimizations for T4
  num_workers: 2  # Reduced to save memory
  use_mixed_precision: true
  memory_efficient_attention: true
  gradient_checkpointing: true  # CRITICAL for T4!

  # T4-specific settings
  use_gradient_checkpointing: true  # Enable to reduce memory usage
  torch_compile: false  # Can cause issues on some T4 setups
  use_amp: true  # Automatic mixed precision

# Incremental Learning
incremental_learning:
  window_size: 90
  overlap: 30
  epochs_per_window: 1

# Evaluation Configuration
evaluation:
  metrics:
    - QLIKE
    - R2
    - RMSE
    - MSE
  statistical_tests:
    - diebold_mariano
    - giacomini_white

# Experiment Tracking
experiment_tracking:
  experiments_dir: "experiments"
  models_dir: "models"
  log_level: "INFO"
  save_every_n_epochs: 10

# Output Configuration
output:
  checkpoints_dir: "models/checkpoints"
  predictions_dir: "experiments/predictions"
  logs_dir: "experiments/logs"

# T4 Memory Optimization
t4_optimization:
  aggressive_memory_management: true
  max_memory_utilization: 0.90  # Use max 90% of 14.56GB
  cleanup_cache_frequency: 5  # Clean cache every 5 batches
