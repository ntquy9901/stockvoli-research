# TimesFM VN30 Fine-tuning Configuration - Memory Optimized for T4 GPU

# System Configuration
system:
  name: "TimesFM VN30 Volatility Forecasting"
  version: "2.0.0"
  device: "cuda"
  random_seed: 42
  project: "TimesFM-VN30-Finetuning"

# Model Configuration
model:
  name: "timesfm-2.5-200m"
  context_length: 64  # Reduced from 128 for memory
  prediction_length: 1
  dtype: "bfloat16"  # Memory-efficient
  use_gradient_checkpointing: true

# Data Configuration
data:
  # All 30 VN30 stocks
  stocks:
    - ACB
    - BCM
    - BID
    - BVH
    - CTG
    - FPT
    - GAS
    - GVR
    - HDB
    - HPG
    - MBB
    - MSN
    - MWG
    - NVL
    - PDR
    - PLX
    - POW
    - SAB
    - SHB
    - SSB
    - SSI
    - STB
    - TCB
    - TPB
    - VCB
    - VHM
    - VIB
    - VIC
    - VJC
    - VNM

  raw_path: "data/raw/prices"
  processed_path: "data/processed"
  features_path: "data/features"

  window_size: 90
  test_size: 0.2

# Training Configuration - MEMORY OPTIMIZED
training:
  batch_size: 1  # VERY SMALL - will accumulate
  gradient_accumulation_steps: 8  # Effective batch = 8
  learning_rate: 0.0001
  optimizer: "SGD"

  # Memory optimizations
  max_grad_norm: 1.0
  use_mixed_precision: true
  memory_efficient_attention: true
  gradient_checkpointing: true

# LoRA Configuration
lora:
  r: 4
  lora_alpha: 8
  target_modules: "all-linear"
  lora_dropout: 0.05
  bias: "none"
  use_dora: false  # DoRA uses more memory

# Incremental Learning
incremental_learning:
  window_size: 90
  overlap: 30
  epochs_per_window: 1

# Evaluation Configuration
evaluation:
  metrics:
    - QLIKE
    - R2
    - RMSE
    - MSE
  statistical_tests:
    - diebold_mariano
    - giacomini_white

# Experiment Tracking
experiment_tracking:
  experiments_dir: "experiments"
  models_dir: "models"
  log_level: "INFO"
